<body class="h-full bg-background">
<!-- Hero Background Wrapper -->
<div class="relative w-full h-full flex items-center justify-center full-bleed-bg">
<!-- Darker overlay for readability if needed, though light mode is preferred -->
<div class="absolute inset-0 bg-primary/5 pointer-events-none"></div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-[480px] px-margin-mobile md:px-0">
<!-- Glassmorphism Card -->
<div class="glass-panel p-8 md:p-12 rounded-xl shadow-2xl flex flex-col items-center">
<!-- Brand Anchor: Logo -->
<div class="mb-10 w-24 h-24 flex items-center justify-center">
<img alt="HAVN Logo" class="w-full h-auto object-contain mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8J1uHjAtpumATcpnMrJANwpUfImlK24kUtO61rzQzEofegTDHtjcgfePCdShmTUJ6KtVvsWGc5MWyRYbGMnvf5Lcq3LEKb5nXoYSyOJzZIPcvROZ5JOfcAf_Qowr8qN4N-04XtzcUSgRk9hIfdfZXFpGSFRI1C-9Z2VXKp1u_KoqFm9SS3heLWxlPF9orm7kzk3NI4ZzaKobVkilIgdVYn4x12ftjLU9yyXidqDoJeQQPQlLtMYqY6kxhW_CyCPZ218KainzphLpm"/>
</div>
<!-- Title Section -->
<div class="text-center mb-10">
<h1 class="font-headline-md text-headline-md text-primary mb-2">Create your sanctuary</h1>
<p class="font-label-md text-label-md text-outline uppercase tracking-widest">Digital Architectural Entry</p>
</div>
<!-- Registration Form -->
<form class="w-full space-y-6">
<div class="grid grid-cols-2 gap-gutter">
<div class="flex flex-col">
<label class="font-label-md text-label-md text-primary uppercase opacity-60 mb-1">First Name</label>
<input class="input-underlined font-body-md text-primary placeholder:text-outline/40" placeholder="Julian" type="text"/>
</div>
<div class="flex flex-col">
<label class="font-label-md text-label-md text-primary uppercase opacity-60 mb-1">Last Name</label>
<input class="input-underlined font-body-md text-primary placeholder:text-outline/40" placeholder="Kemp" type="text"/>
</div>
</div>
<div class="flex flex-col">
<label class="font-label-md text-label-md text-primary uppercase opacity-60 mb-1">Email Address</label>
<input class="input-underlined font-body-md text-primary placeholder:text-outline/40" placeholder="julian.k@haven.com" type="email"/>
</div>
<div class="flex flex-col">
<label class="font-label-md text-label-md text-primary uppercase opacity-60 mb-1">Password</label>
<input class="input-underlined font-body-md text-primary placeholder:text-outline/40" placeholder="••••••••" type="password"/>
</div>
<div class="flex flex-col">
<label class="font-label-md text-label-md text-primary uppercase opacity-60 mb-1">Verification Code</label>
<input class="input-underlined font-body-md text-primary placeholder:text-outline/40 tracking-[0.5em]" placeholder="6-digit code" type="text"/>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full bg-primary text-on-primary py-5 px-8 font-label-md text-label-md uppercase tracking-[0.2em] rounded-lg shadow-sm hover:bg-primary/90 transition-all active:scale-[0.98]" type="submit">
                            Join the Haven
                        </button>
</div>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="h-[1px] bg-outline/20 flex-grow"></div>
<span class="font-label-md text-[10px] text-outline uppercase">or</span>
<div class="h-[1px] bg-outline/20 flex-grow"></div>
</div>
<!-- OAuth Options -->
<button class="w-full flex items-center justify-center gap-3 border border-outline-variant/50 py-4 px-8 font-label-md text-label-md uppercase tracking-wider text-primary rounded-lg hover:bg-white/40 transition-colors" type="button">

</svg>
                    Continue with Google

</p>
