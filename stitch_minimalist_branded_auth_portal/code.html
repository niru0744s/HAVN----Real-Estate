<!DOCTYPE html>

<html class="h-full" lang="en"><head>

                      "inverse-on-surface": "#f1f1ef",
                      "surface-dim": "#dadad8",

                      "on-secondary": "#ffffff",
                      "on-primary-fixed-variant": "#384858",
                      "on-tertiary": "#ffffff",
                      "on-error": "#ffffff",
                      "inverse-surface": "#2f3130",

              "fontFamily": {

          },

<style>
        .sanctuary-shadow {
            box-shadow: 0 10px 40px -10px rgba(27, 43, 58, 0.08);
        }
        .input-minimal:focus {
            outline: none;
            border-bottom-color: #1b2b3a;
        }
        /* Ensure no scroll on standard mobile screens */
        @media (max-height: 740px) {
            .logo-container { margin-bottom: 1.5rem; }
            .header-container { margin-bottom: 1.5rem; }
            .form-container { gap: 0.75rem; }
            .input-field { padding-top: 0.75rem; padding-bottom: 0.75rem; }
            .action-container { margin-top: 1.5rem; }
            .divider-container { margin-top: 1rem; margin-bottom: 1rem; }
            .footer-link-container { margin-top: 1.5rem; margin-bottom: 1rem; }
        }
    </style>
<style data-stitch-cursor=""></style><style data-stitch-scroll-lock=""></style><style>input::placeholder { text-align: center; }</style></head>
<body class="bg-background text-on-surface h-full flex flex-col font-body-md overflow-hidden">
<main class="flex-grow flex flex-col items-center justify-center px-6 w-full max-w-md mx-auto h-full">
<!-- Logo Section -->
<div class="logo-container mb-6 flex justify-center shrink-0">
<img alt="HAVN Logo" class="object-contain h-16 w-16" src="https://lh3.googleusercontent.com/aida/ADBb0ujPoXz0Wz3ywSVdVZQwuDhw_DsXg9xKlc0pYmrvb_HU8DCHuIOpeLGCPla6O_QrxhBAwZZwo-xJmqJ_PTxypMuWTwccerXU4IIdtsv9QyHAYd3432i0Wl7zSwXkahtCHbI08LH9iInhFGTkKXpXq2ZHHoExnFrj2o1-hXApAs-76c-mSsIamRVTKR-ZeTqI0l_oJXhG-y9FEIULBRptCe3OqQVgu7ixI0GNBSby9tnVisWUTypzNQtfXpswAifIe4eHgS4pfkdgrQs"/>
</div>
<!-- Headline -->
<div class="header-container text-center mb-6 shrink-0">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Create your sanctuary</h1>
</div>
<!-- Form Section -->
<form class="w-full form-container space-y-4">
<div class="grid grid-cols-2 gap-3">
<div class="relative">
<label class="font-label-sm text-label-sm text-on-surface-variant absolute -top-2 left-3 px-1 bg-background z-10" for="first_name">First Name</label>
<input class="input-field w-full px-4 py-3 border-surface-variant font-body-md text-body-md input-minimal transition-all border rounded-xl bg-surface-container-low" id="first_name" name="first_name" placeholder="" type="text"/>
</div>
<div class="relative">
<label class="font-label-sm text-label-sm text-on-surface-variant absolute -top-2 left-3 px-1 bg-background z-10" for="last_name">Last Name</label>
<input class="input-field w-full px-4 py-3 border-surface-variant font-body-md text-body-md input-minimal transition-all border rounded-xl bg-surface-container-low" id="last_name" name="last_name" placeholder="" type="text"/>
</div>
</div>
<div class="relative">
<label class="font-label-sm text-label-sm text-on-surface-variant absolute -top-2 left-3 px-1 bg-background z-10" for="email">Email Address</label>
<input class="input-field w-full px-4 py-3 border-surface-variant font-body-md text-body-md input-minimal transition-all border rounded-xl bg-surface-container-low" id="email" name="email" placeholder="" type="email"/>
</div>
<div class="relative">
<label class="font-label-sm text-label-sm text-on-surface-variant absolute -top-2 left-3 px-1 bg-background z-10" for="password">Password</label>
<input class="input-field w-full px-4 py-3 border-surface-variant font-body-md text-body-md input-minimal transition-all border rounded-xl bg-surface-container-low" id="password" name="password" placeholder="" type="password"/>
</div>
<div class="relative">
<label class="font-label-sm text-label-sm text-on-surface-variant absolute -top-2 left-3 px-1 bg-background z-10" for="verification">Verification Code</label>
<input class="input-field w-full px-4 py-3 border-surface-variant font-body-md text-body-md input-minimal transition-all border rounded-xl bg-surface-container-low" id="verification" name="verification" placeholder="" type="text"/>
</div>
<!-- Primary Action -->
<div class="action-container pt-2">
<button class="w-full bg-primary-container text-on-primary py-3.5 px-8 rounded-xl font-label-md text-label-md tracking-wider shadow-[0_8px_30px_rgb(5,22,37,0.12)] active:scale-[0.98] transition-transform duration-200" type="submit">
                    SIGN UP
                </button>
</div>
</form>
<!-- Divider -->
<div class="divider-container w-full flex items-center gap-4 my-4 shrink-0">
<div class="h-[1px] flex-grow bg-surface-variant"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">OR</span>
<div class="h-[1px] flex-grow bg-surface-variant"></div>
</div>
<!-- Social Action -->
<button class="w-full shrink-0 flex items-center justify-center gap-3 bg-surface border border-outline-variant py-3.5 px-8 rounded-xl font-label-md text-label-md text-on-surface active:bg-surface-container-low transition-colors duration-200">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Continue with Google
        </button>
<!-- Footer Link -->
<div class="footer-link-container mt-6 mb-4 shrink-0">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary-container font-label-md text-label-md ml-1 hover:underline underline-offset-4" href="#">Sign In</a>
</p>
</div>
</main>
<!-- Footer Rights -->
<footer class="py-4 text-center w-full shrink-0">
<p class="font-label-sm text-label-sm text-outline">© 2024 HAVN. All rights reserved.</p>
</footer>
</body></html>
